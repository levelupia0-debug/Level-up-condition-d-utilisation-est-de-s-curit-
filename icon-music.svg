<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" rx="64" fill="#030303"/>
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="20" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Icône de note de musique avec lueur -->
  <g filter="url(#glow)">
    <path d="M180 320V120L380 80V280" stroke="#3b82f6" stroke-width="35" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="140" cy="340" r="40" fill="#3b82f6" />
    <circle cx="340" cy="300" r="40" fill="#3b82f6" />
  </g>
</svg>
