<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Fond de l'icône avec coins arrondis -->
  <rect width="512" height="512" rx="100" fill="#030303"/>
  
  <defs>
    <!-- Filtre pour l'effet de lueur bleue -->
    <filter id="blueGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Groupe contenant l'icône avec le filtre de lueur appliqué -->
  <g filter="url(#blueGlow)">
    <!-- La forme en "L" (Level) -->
    <path d="M185 170V315C185 328.807 196.193 340 210 340H355" 
          stroke="#3b82f6" 
          stroke-width="32" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
    
    <!-- Le bouton Play (Movie) -->
    <path d="M235 210L325 255L235 300V210Z" 
          fill="#3b82f6" 
          stroke="#3b82f6" 
          stroke-width="8" 
          stroke-linejoin="round"/>
  </g>
</svg>
